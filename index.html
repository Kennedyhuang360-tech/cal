<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Smart Calculator Pro - 預覽加強版</title>
    <style>
        :root {
            --bg: #f2f2f7; --card: #ffffff; --txt: #000000;
            --op: #ff9f0a; --eq: #34c759; --btn: #e5e5ea; --pre: #007aff;
        }
        [data-theme="dark"] {
            --bg: #000000; --card: #1c1c1e; --txt: #ffffff;
            --op: #ff9f0a; --eq: #30d158; --btn: #3a3a3c; --pre: #5ac8fa;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            margin: 0; font-family: -apple-system, sans-serif; 
            background: var(--bg); color: var(--txt);
            display: flex; justify-content: center; padding: 15px;
        }
        .container { width: 100%; max-width: 400px; display: flex; flex-direction: column; gap: 15px; }
        .calc-card { background: var(--card); padding: 20px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; font-weight: bold; font-size: 0.9rem; }
        
        .display-area { position: relative; width: 100%; margin-bottom: 15px; }
        #display {
            width: 100%; height: 100px; font-size: 2.4rem; text-align: right;
            border: none; background: transparent; color: var(--txt); outline: none;
            padding: 0 5px 35px 5px; font-weight: 600;
        }
        #preview {
            position: absolute; right: 10px; bottom: 8px;
            font-size: 1.3rem; color: var(--pre); font-weight: bold; min-height: 1.5rem;
        }
        
        .buttons { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
        
        button {
            aspect-ratio: 1 / 1; border: none; border-radius: 14px;
            font-size: 1.2rem; font-weight: bold; cursor: pointer;
            background: var(--btn); color: var(--txt);
            display: flex; align-items: center; justify-content: center;
        }
        button:active { opacity: 0.6; transform: scale(0.95); }
        .btn-op { background: var(--op); color: white; font-size: 1.5rem; }
        .btn-eq { background: var(--eq); color: white; grid-column: span 2; aspect-ratio: auto; font-size: 1.8rem; }
        .btn-tool { background: #8e8e93; color: white; }

        .history-panel { background: var(--card); padding: 18px; border-radius: 24px; }
        .hist-header { display:flex; justify-content:space-between; align-items:center; margin-bottom: 10px; }
        #history-list { list-style: none; padding: 0; max-height: 180px; overflow-y: auto; font-size: 0.9rem; margin: 0; }
        #history-list li { border-bottom: 1px solid rgba(0,0,0,0.05); padding: 10px 0; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <div class="calc-card">
        <div class="top-bar">
            <span onclick="document.body.toggleAttribute('data-theme')" style="cursor:pointer;">🌓 主題</span>
            <div>
                <span id="rate-ui">稅率: 10%</span>
                <span onclick="setRate()" style="cursor:pointer; margin-left:5px;">⚙️</span>
            </div>
        </div>
        <div class="display-area">
            <input type="text" id="display" value="0" readonly>
            <div id="preview"></div>
        </div>
        <div class="buttons">
            <button onclick="cls()" class="btn-tool">AC</button>
            <button onclick="add('(')">(</button>
            <button onclick="add(')')">)</button>
            <button onclick="del()" class="btn-tool">DEL</button>
            <button onclick="add('/')" class="btn-op">÷</button>

            <button onclick="add('7')">7</button>
            <button onclick="add('8')">8</button>
            <button onclick="add('9')">9</button>
            <button onclick="unit(25.4,'*')">x25.4</button>
            <button onclick="add('*')" class="btn-op">×</button>

            <button onclick="add('4')">4</button>
            <button onclick="add('5')">5</button>
            <button onclick="add('6')">6</button>
            <button onclick="unit(25.4,'/')">/25.4</button>
            <button onclick="add('-')" class="btn-op">-</button>

            <button onclick="add('1')">1</button>
            <button onclick="add('2')">2</button>
            <button onclick="add('3')">3</button>
            <button onclick="unit(100,'*')">x100</button>
            <button onclick="add('+')" class="btn-op">+</button>

            <button onclick="add('0')">0</button>
            <button onclick="add('.')">.</button>
            <button onclick="taxBtn()" id="tax-btn">+10%</button>
            <button onclick="calc()" class="btn-eq">=</button>
        </div>
    </div>
    
    <div class="history-panel">
        <div class="hist-header">
            <strong>歷史紀錄</strong>
            <small onclick="clearHistory()" style="color:#ff3b30; cursor:pointer;">清空</small>
        </div>
        <ul id="history-list"></ul>
    </div>
</div>

<script>
    let exp = "0";
    let done = false;
    let currentRate = 10;
    const box = document.getElementById('display');
    const pre = document.getElementById('preview');
    const hist = document.getElementById('history-list');

    function fmt(s) {
        if (!s) return "";
        let str = s.toString().replace(/,/g, '');
        return str.replace(/\d+\.?\d*/g, m => {
            let p = m.split('.');
            p[0] = p[0].replace(/\B(?=(\d{3})+(?!\d))/g, ",");
            return p.join('.');
        });
    }

    function add(v) {
        const ops = ['+','-','*','/'];
        if (done) {
            if (ops.includes(v)) done = false;
            else { exp = "0"; done = false; }
        }
        if (exp === "0" && v !== "." && !ops.includes(v) && v !== '(') exp = v;
        else exp += v;
        render();
    }

    function del() {
        if (done) { cls(); return; }
        exp = exp.length > 1 ? exp.slice(0, -1) : "0";
        render();
    }

    function cls() { exp = "0"; done = false; render(); }

    function render() {
        box.value = fmt(exp);
        updatePreview();
    }

    // --- 強化版預覽邏輯 ---
    function updatePreview() {
        let raw = exp.replace(/,/g, '');
        const ops = ['+','-','*','/'];
        
        // 只有包含運算符號才嘗試預覽
        if (ops.some(o => raw.includes(o))) {
            try {
                let temp = raw;
                // 1. 如果結尾是運算符、點、或左括號，先切掉最後一個字再算
                while (temp.length > 0 && (ops.includes(temp.slice(-1)) || temp.slice(-1) === '.' || temp.slice(-1) === '(')) {
                    temp = temp.slice(0, -1);
                }
                
                // 2. 自動補齊括號
                let openP = (temp.match(/\(/g) || []).length;
                let closeP = (temp.match(/\)/g) || []).length;
                while (openP > closeP) { temp += ')'; openP--; }

                if (temp && temp !== "(") {
                    let result = new Function('return ' + temp)();
                    if (result !== undefined && !isNaN(result) && isFinite(result)) {
                        pre.innerText = "= " + fmt(parseFloat(result.toPrecision(12)).toString());
                        return;
                    }
                }
            } catch (e) {}
        }
        pre.innerText = "";
    }

    function calc() {
        try {
            let raw = exp.replace(/,/g, '');
            if (raw === "0") return;
            
            let openP = (raw.match(/\(/g) || []).length;
            let closeP = (raw.match(/\)/g) || []).length;
            while (openP > closeP) { raw += ')'; openP--; }

            let result = new Function('return ' + raw)();
            let rStr = parseFloat(result.toPrecision(12)).toString();
            
            let li = document.createElement('li');
            li.innerHTML = `<div style="color:#888; font-size:0.8rem;">${fmt(raw)}</div><strong>= ${fmt(rStr)}</strong>`;
            li.onclick = () => { exp = rStr; done = false; render(); };
            hist.prepend(li);
            
            exp = rStr;
            done = true;
            render();
        } catch { box.value = "錯誤"; exp = "0"; pre.innerText = ""; }
    }

    function unit(f, op) {
        let match = exp.match(/(\d+\.?\d*)$/);
        if (match) {
            let lastNum = match[0];
            let newVal = new Function(`return ${lastNum} ${op} ${f}`)();
            let rStr = parseFloat(newVal.toPrecision(12)).toString();
            exp = exp.substring(0, exp.length - lastNum.length) + rStr;
            render();
        }
    }

    function setRate() {
        let val = prompt("請輸入稅率百分比 (如 5 代表 5%):", currentRate);
        if (val !== null && !isNaN(val) && val !== "") {
            currentRate = parseFloat(val);
            document.getElementById('rate-ui').innerText = `稅率: ${currentRate}%`;
            document.getElementById('tax-btn').innerText = `+${currentRate}%`;
        }
    }

    function taxBtn() {
        let multiplier = 1 + (currentRate / 100);
        unit(multiplier, '*');
    }

    function clearHistory() {
        if(confirm("確定清空紀錄？")) hist.innerHTML = "";
    }
</script>

</body>
</html>
 <small onclick="clearHistory()" style="color:red; cursor:pointer; font-weight:bold;">清空</small>
        </div>
        <ul id="history-list"></ul>
    </div>
</div>

<script>
    let exp = "0";
    let done = false;
    const box = document.getElementById('display');
    const pre = document.getElementById('preview');
    const hist = document.getElementById('history-list');

    // 格式化數字顯示千分位
    function fmt(s) {
        if (!s) return "";
        return s.toString().replace(/,/g, '').replace(/\d+\.?\d*/g, m => {
            let p = m.split('.');
            p[0] = p[0].replace(/\B(?=(\d{3})+(?!\d))/g, ",");
            return p.join('.');
        });
    }

    function add(v) {
        const ops = ['+','-','*','/'];
        if (done) {
            if (ops.includes(v)) {
                done = false;
            } else {
                exp = "0";
                done = false;
            }
        }
        if (exp === "0" && v !== "." && !ops.includes(v)) exp = v;
        else exp += v;
        render();
    }

    function del() {
        if (done) { cls(); return; }
        exp = exp.length > 1 ? exp.slice(0, -1) : "0";
        render();
    }

    function cls() { exp = "0"; done = false; render(); }

    function render() {
        box.value = fmt(exp);
        updatePreview();
    }

    // 即時預覽邏輯
    function updatePreview() {
        const ops = ['+','-','*','/'];
        let raw = exp.replace(/,/g, '');
        // 只有在包含運算符且結尾不是運算符時才顯示預覽
        if (ops.some(o => raw.includes(o)) && !ops.includes(raw.slice(-1))) {
            try {
                let res = new Function('return ' + raw)();
                if (res !== undefined && !isNaN(res)) {
                    pre.innerText = "= " + fmt(parseFloat(res.toPrecision(12)).toString());
                    return;
                }
            } catch (e) {}
        }
        pre.innerText = "";
    }

    function calc() {
        try {
            let raw = exp.replace(/,/g, '');
            if (raw === "0") return;
            let res = new Function('return ' + raw)();
            let rStr = parseFloat(res.toPrecision(12)).toString();
            
            // 存入紀錄
            let li = document.createElement('li');
            li.innerHTML = `<div style="color:#888">${fmt(exp)}</div><strong>= ${fmt(rStr)}</strong>`;
            li.onclick = () => { exp = rStr; done = false; render(); };
            hist.prepend(li);
            
            exp = rStr;
            done = true;
            render();
        } catch { 
            box.value = "Error"; 
            exp = "0"; 
            pre.innerText = "";
        }
    }

    function unit(f, op) {
        let match = exp.match(/(\d+\.?\d*)$/);
        if (match) {
            let lastNum = match[0];
            let newVal = new Function(`return ${lastNum} ${op} ${f}`)();
            let rStr = parseFloat(newVal.toPrecision(12)).toString();
            exp = exp.substring(0, exp.length - lastNum.length) + rStr;
            render();
        }
    }

    function tax() { unit(1.1, '*'); }

    function clearHistory() {
        if(confirm("確定清空歷史紀錄？")) hist.innerHTML = "";
    }
</script>

</body>
</html>
