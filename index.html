<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Smart Calculator</title>
    <style>
        :root { --bg: #f2f2f7; --card: #fff; --txt: #000; --op: #ff9f0a; --eq: #34c759; --btn: #e5e5ea; }
        [data-theme="dark"] { --bg: #000; --card: #1c1c1e; --txt: #fff; --op: #ff9f0a; --eq: #30d158; --btn: #3a3a3c; }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: sans-serif; background: var(--bg); color: var(--txt); padding: 10px; }
        
        /* 極簡容器 */
        .wrap { width: 100%; max-width: 400px; margin: 0 auto; }
        .box { background: var(--card); padding: 15px; border-radius: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); margin-bottom: 15px; }
        
        /* 顯示區 */
        .res-area { background: rgba(150,150,150,0.1); border-radius: 12px; padding: 15px; text-align: right; margin-bottom: 15px; }
        #display { width: 100%; border: none; background: transparent; color: var(--txt); font-size: 30px; text-align: right; font-weight: bold; outline: none; }
        #preview { font-size: 18px; color: #007aff; font-weight: bold; height: 22px; margin-top: 5px; }
        
        /* 按鈕網格 */
        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }
        button { width: 100%; aspect-ratio: 1; border: none; border-radius: 12px; font-size: 18px; font-weight: bold; background: var(--btn); color: var(--txt); }
        .btn-op { background: var(--op); color: #fff; }
        .btn-eq { background: var(--eq); color: #fff; grid-column: span 2; aspect-ratio: auto; }
        .btn-tool { background: #8e8e93; color: #fff; }
        button:active { opacity: 0.6; }

        /* 歷史紀錄 */
        .hist { background: var(--card); padding: 15px; border-radius: 20px; }
        #hist-list { list-style: none; max-height: 140px; overflow-y: auto; font-size: 14px; margin-top: 10px; }
        #hist-list li { border-bottom: 1px solid rgba(0,0,0,0.05); padding: 8px 0; }
    </style>
</head>
<body>

<div class="wrap">
    <div class="box">
        <div style="display:flex; justify-content:space-between; margin-bottom:10px; font-size:12px;">
            <span onclick="document.body.toggleAttribute('data-theme')" style="cursor:pointer;">🌓 主題</span>
            <span id="rate-ui" onclick="setRate()">稅率: 10% ⚙️</span>
        </div>
        <div class="res-area">
            <input type="text" id="display" value="0" readonly>
            <div id="preview"></div>
        </div>
        <div class="grid">
            <button onclick="cls()" class="btn-tool">AC</button>
            <button onclick="add('(')">(</button>
            <button onclick="add(')')">)</button>
            <button onclick="del()" class="btn-tool">DEL</button>
            <button onclick="add('/')" class="btn-op">÷</button>
            <button onclick="add('7')">7</button>
            <button onclick="add('8')">8</button>
            <button onclick="add('9')">9</button>
            <button onclick="unit(25.4,'*')">x25.4</button>
            <button onclick="add('*')" class="btn-op">×</button>
            <button onclick="add('4')">4</button>
            <button onclick="add('5')">5</button>
            <button onclick="add('6')">6</button>
            <button onclick="unit(25.4,'/')">/25.4</button>
            <button onclick="add('-')" class="btn-op">-</button>
            <button onclick="add('1')">1</button>
            <button onclick="add('2')">2</button>
            <button onclick="add('3')">3</button>
            <button onclick="unit(100,'*')">x100</button>
            <button onclick="add('+')" class="btn-op">+</button>
            <button onclick="add('0')">0</button>
            <button onclick="add('.')">.</button>
            <button onclick="tax()" id="tax-btn">+10%</button>
            <button onclick="calc()" class="btn-eq">=</button>
        </div>
    </div>
    <div class="hist">
        <strong>歷史紀錄</strong>
        <ul id="hist-list"></ul>
    </div>
</div>

<script>
    var exp = '0', done = false, rate = 10;
    var box = document.getElementById('display');
    var pre = document.getElementById('preview');
    var list = document.getElementById('hist-list');

    function fmt(s) {
        var n = s.toString().replace(/,/g, '');
        return n.replace(/\d+\.?\d*/g, function(m) {
            var p = m.split('.');
            p[0] = p[0].replace(/\B(?=(\d{3})+(?!\d))/g, ',');
            return p.join('.');
        });
    }

    function add(v) {
        if (done) { if (['+','-','*','/'].includes(v)) done = false; else { exp = '0'; done = false; } }
        if (exp === '0' && v !== '.' && !['+','-','*','/'].includes(v)) exp = v;
        else exp += v;
        render();
    }

    function del() { if (done) { cls(); return; } exp = exp.length > 1 ? exp.slice(0, -1) : '0'; render(); }
    function cls() { exp = '0'; done = false; render(); }
    function render() { box.value = fmt(exp); updatePre(); }

    function updatePre() {
        var raw = exp.replace(/,/g, '');
        if (/[+\-*/]/.test(raw)) {
            try {
                var t = raw;
                while (t && /[+\-*/.(]$/.test(t)) t = t.slice(0,-1);
                var o = (t.match(/\(/g) || []).length, c = (t.match(/\)/g) || []).length;
                while (o > c) { t += ')'; o--; }
                if (t) {
                    var r = new Function('return ' + t)();
                    if (r !== undefined && !isNaN(r)) { pre.innerText = '= ' + fmt(parseFloat(r.toPrecision(12))); return; }
                }
            } catch(e) {}
        }
        pre.innerText = '';
    }

    function calc() {
        try {
            var raw = exp.replace(/,/g, '');
            var o = (raw.match(/\(/g) || []).length, c = (raw.match(/\)/g) || []).length;
            while (o > c) { raw += ')'; o--; }
            var r = new Function('return ' + raw)();
            var s = parseFloat(r.toPrecision(12)).toString();
            var li = document.createElement('li');
            li.innerHTML = '<div style="color:gray;font-size:11px">' + fmt(raw) + '</div><strong>= ' + fmt(s) + '</strong>';
            list.prepend(li);
            exp = s; done = true; render();
        } catch(e) { box.value = 'Error'; exp = '0'; }
    }

    function unit(f, op) {
        var m = exp.match(/(\d+\.?\d*)$/);
        if (m) {
            var n = new Function('return ' + m[0] + op + f)();
            exp = exp.substring(0, exp.length - m[0].length) + parseFloat(n.toPrecision(12)).toString();
            render();
        }
    }

    function tax() { unit(1 + (rate/100), '*'); }
    function setRate() {
        var v = prompt('輸入稅率(%):', rate);
        if (v !== null && !isNaN(v) && v !== '') {
            rate = parseFloat(v);
            document.getElementById('rate-ui').innerText = '稅率: ' + rate + '% ⚙️';
            document.getElementById('tax-btn').innerText = '+' + rate + '%';
        }
    }
</script>
</body>
</html>
