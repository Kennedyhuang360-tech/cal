<style>
    :root {
        --bg-color: #f0f2f5;
        --card-bg: #ffffff;
        --text-primary: #333;
        --text-secondary: #888;
        --text-preview: #007aff;
        --border-color: #f0f0f0;
        --btn-bg: #e9ecef;
        --btn-text: #495057;
        --accent-color: #007aff;
        --op-color: #ff9f0a;
        --equal-color: #34c759;
        --extra-color: #5856d6;
        --unit-color: #5ac8fa;
    }

    [data-theme="dark"] {
        --bg-color: #1c1c1e;
        --card-bg: #2c2c2e;
        --text-primary: #ffffff;
        --text-secondary: #aaa;
        --text-preview: #5ac8fa;
        --border-color: #3a3a3c;
        --btn-bg: #3a3a3c;
        --btn-text: #ffffff;
    }

    /* 基礎重置，防止縮放問題 */
    * { box-sizing: border-box; }

    body {
        font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif;
        display: flex;
        justify-content: center;
        align-items: flex-start; /* 手機上從頂部開始排版 */
        min-height: 100vh;
        margin: 0;
        padding: 10px; /* 給邊緣一點留白 */
        background-color: var(--bg-color);
        color: var(--text-primary);
        transition: background 0.3s ease;
    }

    .container {
        display: flex;
        flex-direction: column; /* 預設垂直排列，適合手機 */
        gap: 20px;
        background: var(--card-bg);
        padding: 15px;
        border-radius: 24px;
        box-shadow: 0 15px 35px rgba(0,0,0,0.2);
        width: 100%;
        max-width: 440px; /* 限制最大寬度防止變形 */
    }

    .calculator { width: 100%; }

    .top-bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
    }

    .icon-group { display: flex; gap: 10px; }

    .icon-btn {
        background: none; border: none; cursor: pointer;
        font-size: 1.2rem; color: var(--text-primary);
        padding: 5px; border-radius: 8px;
    }

    .display-container {
        position: relative;
        margin-bottom: 15px;
    }

    #display {
        width: 100%; height: 90px; 
        font-size: 2.2rem !important; 
        font-weight: 800;
        text-align: right; 
        padding: 10px 15px 35px 15px;
        border: 2px solid var(--border-color);
        background: var(--bg-color); border-radius: 15px;
        color: var(--text-primary); outline: none;
        overflow: hidden;
    }

    #preview {
        position: absolute;
        right: 15px;
        bottom: 10px;
        font-size: 1.1rem;
        font-weight: 700;
        color: var(--text-preview);
        opacity: 0.8;
    }

    .buttons {
        display: grid; 
        grid-template-columns: repeat(5, 1fr); 
        gap: 8px; /* 縮小間距適配小螢幕 */
    }

    button.calc-btn {
        padding: 15px 0; 
        font-size: 1.3rem; 
        font-weight: 800;
        border: none; border-radius: 12px; cursor: pointer;
        background: var(--btn-bg); color: var(--btn-text);
        transition: all 0.1s; -webkit-tap-highlight-color: transparent;
    }

    /* 調整特殊按鈕大小防止擠壓 */
    .btn-op { background: var(--op-color) !important; color: white !important; font-size: 1.5rem !important; }
    .btn-special { background: var(--accent-color) !important; color: white !important; font-size: 1.1rem !important; }
    .btn-extra { background: var(--extra-color) !important; color: white !important; font-size: 1rem !important; }
    .btn-unit { background: var(--unit-color) !important; color: white !important; font-size: 0.9rem !important; }
    .btn-equal { background: var(--equal-color) !important; color: white !important; font-size: 1.8rem !important; }
    .btn-tool { background: #adb5bd !important; color: white !important; font-size: 1.1rem !important; }
    .btn-paren { background: #6c757d !important; color: white !important; font-size: 1.3rem !important; }

    .history-panel {
        width: 100%; border-top: 1px solid var(--border-color); padding-top: 15px;
    }

    #history-list {
        list-style: none; padding: 0; margin: 10px 0;
        max-height: 200px; overflow-y: auto;
    }

    #history-list li {
        padding: 10px; border-bottom: 1px solid var(--border-color);
        font-size: 1rem; border-radius: 8px;
    }

    /* 桌面版寬螢幕優化 */
    @media (min-width: 900px) {
        .container {
            flex-direction: row;
            max-width: 800px;
        }
        .calculator { width: 440px; }
        .history-panel {
            width: 300px;
            border-top: none;
            border-left: 1px solid var(--border-color);
            padding-top: 0;
            padding-left: 20px;
        }
        #history-list { max-height: 450px; }
    }
</style>
