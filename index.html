<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>計算機 - 最終修正版</title>
    <style>
        :root {
            --bg: #f2f2f7; --card: #ffffff; --txt: #000000;
            --op: #ff9f0a; --eq: #34c759; --btn: #e5e5ea;
        }
        [data-theme="dark"] {
            --bg: #000000; --card: #1c1c1e; --txt: #ffffff;
            --op: #ff9f0a; --eq: #30d158; --btn: #3a3a3c;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            margin: 0; font-family: -apple-system, sans-serif; 
            background: var(--bg); color: var(--txt);
            display: flex; justify-content: center; padding: 20px;
        }
        .container { width: 100%; max-width: 400px; display: flex; flex-direction: column; gap: 15px; }
        .calc-card { background: var(--card); padding: 20px; border-radius: 24px; shadow: 0 10px 30px rgba(0,0,0,0.1); }
        
        .top-bar { display: flex; justify-content: space-between; margin-bottom: 10px; font-weight: bold; }
        
        #display {
            width: 100%; height: 80px; font-size: 2.5rem; text-align: right;
            border: none; background: transparent; color: var(--txt); outline: none;
            margin-bottom: 20px; padding: 0;
        }
        
        .buttons { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
        
        button {
            aspect-ratio: 1 / 1; border: none; border-radius: 12px;
            font-size: 1.2rem; font-weight: bold; cursor: pointer;
            background: var(--btn); color: var(--txt);
        }
        button:active { opacity: 0.7; }
        .btn-op { background: var(--op); color: white; }
        .btn-eq { background: var(--eq); color: white; grid-column: span 2; aspect-ratio: auto; }
        .btn-tool { background: #8e8e93; color: white; }

        .history-panel { background: var(--card); padding: 15px; border-radius: 20px; }
        #history-list { list-style: none; padding: 0; max-height: 150px; overflow-y: auto; font-size: 0.9rem; }
        #history-list li { border-bottom: 1px solid #eee; padding: 8px 0; }
    </style>
</head>
<body>

<div class="container">
    <div class="calc-card">
        <div class="top-bar">
            <span onclick="document.body.toggleAttribute('data-theme')">🌓 主題</span>
            <span id="rate-ui">稅率: 10%</span>
        </div>
        <input type="text" id="display" value="0" readonly>
        <div class="buttons">
            <button onclick="cls()" class="btn-tool">AC</button>
            <button onclick="add('(')">(</button>
            <button onclick="add(')')">)</button>
            <button onclick="del()" class="btn-tool">DEL</button>
            <button onclick="add('/')" class="btn-op">÷</button>

            <button onclick="add('7')">7</button>
            <button onclick="add('8')">8</button>
            <button onclick="add('9')">9</button>
            <button onclick="unit(25.4,'*')">x25.4</button>
            <button onclick="add('*')" class="btn-op">×</button>

            <button onclick="add('4')">4</button>
            <button onclick="add('5')">5</button>
            <button onclick="add('6')">6</button>
            <button onclick="unit(25.4,'/')">/25.4</button>
            <button onclick="add('-')" class="btn-op">-</button>

            <button onclick="add('1')">1</button>
            <button onclick="add('2')">2</button>
            <button onclick="add('3')">3</button>
            <button onclick="unit(100,'*')">x100</button>
            <button onclick="add('+')" class="btn-op">+</button>

            <button onclick="add('0')">0</button>
            <button onclick="add('.')">.</button>
            <button onclick="tax()">+10%</button>
            <button onclick="calc()" class="btn-eq">=</button>
        </div>
    </div>
    
    <div class="history-panel">
        <div style="display:flex; justify-content:space-between;">
            <strong>歷史紀錄</strong>
            <small onclick="localStorage.clear(); location.reload();" style="color:red; cursor:pointer;">清空</small>
        </div>
        <ul id="history-list"></ul>
    </div>
</div>

<script>
    let exp = "0";
    let done = false;
    const box = document.getElementById('display');
    const hist = document.getElementById('history-list');

    function fmt(s) {
        return s.replace(/,/g, '').replace(/\d+\.?\d*/g, m => {
            let p = m.split('.');
            p[0] = p[0].replace(/\B(?=(\d{3})+(?!\d))/g, ",");
            return p.join('.');
        });
    }

    function add(v) {
        if (done) {
            if (['+','-','*','/'].includes(v)) done = false;
            else { exp = "0"; done = false; }
        }
        if (exp === "0" && v !== "." && !['+','-','*','/'].includes(v)) exp = v;
        else exp += v;
        render();
    }

    function del() {
        if (done) { cls(); return; }
        exp = exp.length > 1 ? exp.slice(0, -1) : "0";
        render();
    }

    function cls() { exp = "0"; done = false; render(); }

    function render() { box.value = fmt(exp); }

    function calc() {
        try {
            let res = eval(exp.replace(/,/g, ''));
            let rStr = parseFloat(res.toPrecision(12)).toString();
            let li = document.createElement('li');
            li.innerHTML = `<div>${exp}</div><strong>= ${fmt(rStr)}</strong>`;
            hist.prepend(li);
            exp = rStr;
            done = true;
            render();
        } catch { box.value = "Error"; exp = "0"; }
    }

    function unit(f, op) {
        let nums = exp.match(/(\d+\.?\d*)$/);
        if (nums) {
            let n = eval(nums[0] + op + f);
            exp = exp.replace(/(\d+\.?\d*)$/, parseFloat(n.toPrecision(12)).toString());
            render();
        }
    }

    function tax() { unit(1.1, '*'); }
</script>

</body>
</html>
