<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Smart Calculator Pro - 大字加強版</title>
    <style>
        :root {
            --bg: #f2f2f7; --card: #ffffff; --txt: #000000;
            --op: #ff9f0a; --eq: #34c759; --btn: #e5e5ea; --pre: #007aff;
        }
        .dark-mode {
            --bg: #000000; --card: #1c1c1e; --txt: #ffffff;
            --op: #ff9f0a; --eq: #30d158; --btn: #3a3a3c; --pre: #5ac8fa;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { 
            font-family: -apple-system, sans-serif; 
            background: var(--bg); color: var(--txt);
            padding: 10px; transition: background 0.3s;
        }
        .wrap { width: 100%; max-width: 400px; margin: 0 auto; }
        .box { 
            background: var(--card); padding: 20px; border-radius: 24px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); margin-bottom: 15px; 
        }
        .top { display: flex; justify-content: space-between; margin-bottom: 15px; font-size: 15px; font-weight: bold; }
        
        .screen { background: rgba(150,150,150,0.1); border-radius: 15px; padding: 18px; text-align: right; margin-bottom: 15px; overflow: hidden; }
        
        /* 螢幕字體極大化 */
        #display { 
            width: 100%; border: none; background: transparent; color: var(--txt); 
            font-size: 44px; text-align: right; font-weight: 800; outline: none;
            overflow-x: auto; white-space: nowrap;
        }
        #display::-webkit-scrollbar { display: none; }
        #preview { font-size: 22px; color: var(--pre); font-weight: bold; height: 28px; margin-top: 5px; overflow: hidden; }
        
        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
        
        /* 按鈕字體加大 */
        button { 
            width: 100%; aspect-ratio: 1; border: none; border-radius: 15px; 
            font-size: 22px; font-weight: bold; background: var(--btn); color: var(--txt); cursor: pointer; 
        }
        .btn-op { background: var(--op); color: #fff; font-size: 24px; }
        
        /* 等於按鈕加大至佔用 3 格 */
        .btn-eq { background: var(--eq); color: #fff; grid-column: span 3; aspect-ratio: auto; font-size: 28px; }
        
        .btn-tool { background: #8e8e93; color: #fff; }
        .btn-undo { background: #5856d6; color: #fff; }
        
        button:active { opacity: 0.5; transform: scale(0.95); }

        .hist-box { background: var(--card); padding: 15px; border-radius: 20px; }
        #h-list { list-style: none; max-height: 150px; overflow-y: auto; font-size: 14px; margin-top: 10px; }
        #h-list li { border-bottom: 1px solid rgba(128,128,128,0.1); padding: 10px 0; }
    </style>
</head>
<body>
<div class="wrap">
    <div class="box">
        <div class="top">
            <span onclick="toggleMode()" style="cursor:pointer; padding:5px; background:var(--btn); border-radius:8px;">🌓 主題切換</span>
            <span id="rate-ui" onclick="setRate()">稅率: 10% ⚙️</span>
        </div>
        <div class="screen">
            <input type="text" id="display" value="0" readonly>
            <div id="preview"></div>
        </div>
        <div class="grid">
            <button onclick="cls()" class="btn-tool">AC</button>
            <button onclick="add('(')">(</button>
            <button onclick="add(')')">)</button>
            <button onclick="undo()" class="btn-undo">↩</button>
            <button onclick="del()" class="btn-tool">DEL</button>
            
            <button onclick="add('7')">7</button>
            <button onclick="add('8')">8</button>
            <button onclick="add('9')">9</button>
            <button onclick="unit(25.4,'*')">x25.4</button>
            <button onclick="add('/')" class="btn-op">÷</button>
            
            <button onclick="add('4')">4</button>
            <button onclick="add('5')">5</button>
            <button onclick="add('6')">6</button>
            <button onclick="unit(25.4,'/')">/25.4</button>
            <button onclick="add('*')" class="btn-op">×</button>
            
            <button onclick="add('1')">1</button>
            <button onclick="add('2')">2</button>
            <button onclick="add('3')">3</button>
            <button onclick="unit(100,'*')">x100</button>
            <button onclick="add('-')" class="btn-op">-</button>
            
            <button onclick="add('0')">0</button>
            <button onclick="add('.')">.</button>
            <button onclick="tax()" id="tax-btn">+10%</button>
            <button onclick="add('+')" class="btn-op">+</button>
            <button onclick="calc()" class="btn-eq" style="grid-column: span 3;">=</button>
        </div>
    </div>
    <div class="hist-box">
        <div style="display:flex; justify-content:space-between;">
            <strong>歷史紀錄</strong>
            <small onclick="clearHist()" style="color:red; cursor:pointer;">清空</small>
        </div>
        <ul id="h-list"></ul>
    </div>
</div>

<script>
    var exp = '0', done = false, rate = 10;
    var undoStack = [];
    var box = document.getElementById('display');
    var pre = document.getElementById('preview');
    var list = document.getElementById('h-list');

    function saveState() {
        if (undoStack.length === 0 || undoStack[undoStack.length - 1] !== exp) {
            undoStack.push(exp);
            if (undoStack.length > 50) undoStack.shift();
        }
    }

    function undo() {
        if (undoStack.length > 1) {
            undoStack.pop();
            exp = undoStack[undoStack.length - 1];
            done = false;
            render(true);
        } else if (undoStack.length === 1) {
            exp = undoStack[0];
            render(true);
        }
    }

    function fmt(s) {
        var n = s.toString().replace(/,/g, '');
        return n.replace(/\d+\.?\d*/g, function(m) {
            var p = m.split('.');
            p[0] = p[0].replace(/\B(?=(\d{3})+(?!\d))/g, ',');
            return p.join('.');
        });
    }

    function add(v) {
        if (done) { 
            if (['+','-','*','/'].includes(v)) done = false; 
            else { exp = '0'; done = false; } 
        }
        if (exp === '0' && v !== '.' && !['+','-','*','/'].includes(v)) exp = v;
        else exp += v;
        render();
    }

    function del() { if (done) { cls(); return; } exp = exp.length > 1 ? exp.slice(0, -1) : '0'; render(); }
    function cls() { exp = '0'; done = false; undoStack = []; render(); }

    function render(isUndo) {
        box.value = fmt(exp);
        updatePre();
        if (!isUndo) saveState();
        setTimeout(function(){
            box.scrollLeft = box.scrollWidth;
        }, 0);
    }

    function updatePre() {
        var raw = exp.replace(/,/g, '');
        if (/[+\-*/]/.test(raw)) {
            try {
                var t = raw;
                while (t && /[+\-*/.(]$/.test(t)) t = t.slice(0,-1);
                var o = (t.match(/\(/g) || []).length, c = (t.match(/\)/g) || []).length;
                while (o > c) { t += ')'; o--; }
                if (t) {
                    var r = new Function('return ' + t)();
                    if (r !== undefined && !isNaN(r)) { pre.innerText = '= ' + fmt(parseFloat(r.toPrecision(12))); return; }
                }
            } catch(e) {}
        }
        pre.innerText = '';
    }

    function calc() {
        try {
            var raw = exp.replace(/,/g, '');
            var o = (raw.match(/\(/g) || []).length, c = (raw.match(/\)/g) || []).length;
            while (o > c) { raw += ')'; o--; }
            var r = new Function('return ' + raw)();
            var s = parseFloat(r.toPrecision(12)).toString();
            var li = document.createElement('li');
            li.innerHTML = '<div style="color:gray;font-size:11px">' + fmt(raw) + '</div><strong>= ' + fmt(s) + '</strong>';
            li.onclick = function() { exp = s; done = false; render(); };
            list.prepend(li);
            exp = s; done = true; 
            render();
        } catch(e) { box.value = 'Error'; exp = '0'; }
    }

    function unit(f, op) {
        var m = exp.match(/(\d+\.?\d*)$/);
        if (m) {
            var n = new Function('return ' + m[0] + op + f)();
            exp = exp.substring(0, exp.length - m[0].length) + parseFloat(n.toPrecision(12)).toString();
            render();
        }
    }

    function tax() { unit(1 + (rate/100), '*'); }

    function setRate() {
        var v = prompt('請輸入稅率數字 (折扣請輸入負數):', rate);
        if (v !== null && !isNaN(v) && v !== '') {
            rate = parseFloat(v);
            updateRateUI();
        }
    }

    function updateRateUI() {
        var displayRate = (rate >= 0 ? '+' : '') + rate + '%';
        document.getElementById('rate-ui').innerText = '稅率: ' + displayRate + ' ⚙️';
        document.getElementById('tax-btn').innerText = displayRate;
    }

    function toggleMode() {
        document.body.classList.toggle('dark-mode');
    }

    function clearHist() { list.innerHTML = ''; }
    saveState();
</script>
</body>
</html>
